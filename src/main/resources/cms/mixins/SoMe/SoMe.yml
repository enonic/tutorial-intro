displayName: "Social Media"
form:
  - type: "TextLine"
    name: "imdb"
    label: "Internet Movie Database Url"
    helpText: "URL to IMDB"
    occurrences:
      min: 0
      max: 1
  - type: "TextLine"
    name: "twitter"
    label: "Twitter"
    helpText: "Twitter Handle - i.e. @enonicHQ"
    occurrences:
      min: 0
      max: 1
    regexp: "^@?(\\w){1,15}$"
  - type: "TextLine"
    name: "instagram"
    label: "Instagram"
    helpText: "Instagram Handle - i.e. @username"
    occurrences:
      min: 0
      max: 1
    regexp: "^@?(\\w){1,28}$"
