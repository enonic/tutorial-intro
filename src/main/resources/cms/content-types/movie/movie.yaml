kind: "ContentType"
superType: "base:structured"
title: "Movie"
description: "Cinematic films"
form:
  - type: "TextLine"
    name: "subtitle"
    label: "Subtitle"
    occurrences:
      min: 0
      max: 1
  - type: "ContentSelector"
    name: "director"
    label: "Director"
    occurrences:
      min: 0
      max: 1
    allowContentType:
      - "person"
  - type: "ImageSelector"
    name: "photos"
    label: "Photos"
    occurrences:
      min: 0
      max: 0
  - type: "TextLine"
    name: "trailer"
    label: "Youtube Trailer"
    helpText: "Use a valid Youtube link or video ID"
    occurrences:
      min: 0
      max: 1
    regexp: "^http(?:s?):\\/\\/(?:www\\.)?youtu(?:be\\.com\\/watch\\?v=|\\.be\\/)([\\\
      w\\-\\_]*)(&(amp;)?[\\w\\?‌​=]*)?$"
  - type: "TextArea"
    name: "abstract"
    label: "Abstract"
    occurrences:
      min: 1
      max: 1
  - type: "Date"
    name: "release"
    label: "Release Date"
    occurrences:
      min: 0
      max: 1
  - type: "ItemSet"
    name: "cast"
    label: "Cast"
    occurrences:
      min: 0
      max: 0
    items:
      - type: "ContentSelector"
        name: "actor"
        label: "Actor"
        occurrences:
          min: 1
          max: 1
        allowContentType:
          - "person"
      - type: "TextLine"
        name: "character"
        label: "Character"
        occurrences:
          min: 1
          max: 1
  - type: "TextLine"
    name: "website"
    label: "Official Website"
    occurrences:
      min: 0
      max: 1
    regexp: "^(https?)://[^\\s/$.?#].[^\\s]*$"
